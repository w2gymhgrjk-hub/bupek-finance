version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: bupek_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bupek_finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bupek_secure_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: bupek_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-bupek_secure_2024}@postgres:5432/bupek_finance
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: bupek_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  api_uploads:
  api_logs: